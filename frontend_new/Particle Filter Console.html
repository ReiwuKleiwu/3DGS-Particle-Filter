<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3D-GS Particle Filter · Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: #14161b;
      --panel-2: #1a1d24;
      --line: #232730;
      --line-2: #2c313c;
      --text: #d9dde6;
      --text-dim: #7d8493;
      --text-faint: #555b67;
      --accent: oklch(0.78 0.14 200);
      --truth: oklch(0.78 0.16 145);
      --estimate: oklch(0.78 0.14 75);
      --danger: oklch(0.7 0.18 25);
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }
    [data-theme="light"] {
      --bg: #ecebe6;
      --panel: #f7f6f1;
      --panel-2: #ffffff;
      --line: #d8d6cf;
      --line-2: #c2bfb6;
      --text: #1a1c20;
      --text-dim: #5a5e68;
      --text-faint: #8c8f96;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Top status bar */
    .topbar {
      height: 40px;
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .topbar .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--line);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .brand-mark {
      width: 14px; height: 14px;
      background: var(--accent);
      box-shadow: 0 0 12px color-mix(in oklch, var(--accent) 60%, transparent);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    }
    .brand .title { color: var(--text); }
    .brand .sub { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

    .topbar .stats { display: flex; align-items: stretch; flex: 1; }
    .stat {
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 14px;
      border-right: 1px solid var(--line);
      min-width: 90px;
    }
    .stat .k { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
    .stat .v { font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .stat .v.ok { color: var(--truth); }
    .stat .v.warn { color: var(--estimate); }
    .stat .v.err { color: var(--danger); }
    .stat .v .unit { color: var(--text-dim); font-weight: 400; font-size: 10px; margin-left: 2px; }

    .topbar .right { display: flex; align-items: center; padding: 0 16px; gap: 14px; color: var(--text-dim); }
    .led { width: 7px; height: 7px; border-radius: 50%; background: var(--truth); box-shadow: 0 0 8px var(--truth); }
    .led.warn { background: var(--estimate); box-shadow: 0 0 8px var(--estimate); }

    /* Main grid */
    .root {
      height: calc(100vh - 40px - 44px);
      display: grid;
      grid-template-columns: 220px 1fr 360px;
      gap: 0;
    }

    /* Left rail */
    .rail {
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .rail-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--line); }
    .rail-section h3 {
      margin: 0 0 10px;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 600;
    }
    .layer-toggle { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; cursor: default; }
    .layer-toggle .name { color: var(--text); font-size: 11.5px; }
    .layer-toggle .name .swatch {
      display: inline-block; width: 8px; height: 8px; margin-right: 8px; vertical-align: middle;
      border-radius: 1px;
    }
    .switch {
      position: relative; width: 26px; height: 14px;
      background: var(--line-2); border-radius: 999px; transition: background .15s;
    }
    .switch[data-on="1"] { background: var(--accent); }
    .switch i {
      position: absolute; top: 2px; left: 2px; width: 10px; height: 10px;
      background: #fff; border-radius: 50%; transition: transform .15s;
    }
    .switch[data-on="1"] i { transform: translateX(12px); }

    .legend-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; color: var(--text-dim); }
    .legend-row .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-row .dot.ring { background: transparent; border: 1.5px solid var(--estimate); }
    .legend-row .dot.gt { background: var(--truth); }
    .legend-row .dot.est { background: transparent; border: 1.5px solid var(--estimate); }

    .pgm-meta { color: var(--text-dim); font-size: 10.5px; line-height: 1.6; }
    .pgm-meta b { color: var(--text); font-weight: 500; }

    /* Center map */
    .map-col { position: relative; background: var(--bg); }
    .map-wrap { position: absolute; inset: 0; }
    .map-wrap canvas { width: 100%; height: 100%; }
    .map-hud-tl, .map-hud-tr, .map-hud-bl, .map-hud-br {
      position: absolute; display: flex; gap: 6px; pointer-events: none;
    }
    .map-hud-tl { top: 12px; left: 12px; flex-direction: column; align-items: flex-start; }
    .map-hud-tr { top: 12px; right: 12px; }
    .map-hud-bl { bottom: 12px; left: 12px; }
    .map-hud-br { bottom: 12px; right: 12px; flex-direction: column; pointer-events: auto; }
    .hud-chip {
      background: rgba(20, 22, 28, 0.78);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
      padding: 5px 9px;
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text);
      letter-spacing: 0.02em;
      border-radius: 2px;
    }
    [data-theme="light"] .hud-chip { background: rgba(255,255,255,0.85); }
    .hud-chip.dim { color: var(--text-dim); }
    .hud-chip.mono { font-family: var(--mono); }
    .zoom-btn {
      width: 28px; height: 28px;
      background: rgba(20, 22, 28, 0.78);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: var(--mono); font-size: 14px; line-height: 1;
      cursor: default;
      border-radius: 2px;
    }
    [data-theme="light"] .zoom-btn { background: rgba(255,255,255,0.85); }
    .zoom-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Right column */
    .right-col {
      background: var(--panel);
      border-left: 1px solid var(--line);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .right-section { border-bottom: 1px solid var(--line); display: flex; flex-direction: column; }
    .right-section .head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-faint); font-weight: 600;
    }
    .right-section .head .pill {
      margin-left: auto;
      padding: 2px 7px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--text-dim);
      letter-spacing: 0.02em; text-transform: none;
    }

    .cam-card {
      display: flex; flex-direction: column;
      border-top: 1px solid var(--line);
    }
    .cam-card:first-child { border-top: 0; }
    .cam-hd {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--panel-2);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 10.5px;
    }
    .cam-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cam-lbl { color: var(--text); font-weight: 600; letter-spacing: 0.04em; }
    .cam-sub { color: var(--text-faint); font-size: 9.5px; margin-left: auto; letter-spacing: 0.04em; }
    .cam-body { position: relative; aspect-ratio: 16 / 10; background: #000; overflow: hidden; }
    .cam-body canvas { display: block; width: 100%; height: 100%; }
    .cam-corner {
      position: absolute;
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      letter-spacing: 0.06em;
    }
    .cam-corner.tl { top: 6px; left: 8px; color: var(--danger); font-weight: 600; }
    .cam-corner.tr { top: 6px; right: 8px; }
    .cam-corner.bl { bottom: 6px; left: 8px; }
    .cam-corner.br { bottom: 6px; right: 8px; color: rgba(255,255,255,0.5); }

    .graph-card { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .graph-tabs { display: flex; gap: 2px; margin-left: auto; padding: 2px; background: var(--bg); border: 1px solid var(--line); border-radius: 2px; }
    .graph-tabs .gtab {
      appearance: none;
      background: transparent;
      border: 0;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      cursor: default;
      border-radius: 1px;
      text-transform: none;
    }
    .graph-tabs .gtab:hover { color: var(--text); }
    .graph-tabs .gtab.on { background: var(--accent); color: #000; font-weight: 600; }

    /* Right-column main tabs (VIEWS / FILTER) */
    .col-tabs {
      display: flex;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      padding: 0;
    }
    .col-tab {
      appearance: none;
      flex: 1;
      background: transparent;
      border: 0;
      border-right: 1px solid var(--line);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 11px 12px;
      cursor: default;
      position: relative;
    }
    .col-tab:last-child { border-right: 0; }
    .col-tab:hover { color: var(--text); }
    .col-tab.on { color: var(--accent); background: var(--panel); }
    .col-tab.on::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px; height: 2px;
      background: var(--accent);
    }
    .col-tab .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 5px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 2px;
      font-size: 8.5px;
      color: var(--text-dim);
    }
    .col-tab.on .badge { color: var(--accent); border-color: var(--accent); }
    .right-pane { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .right-pane.scroll { overflow-y: auto; }

    /* Filter controls */
    .fc-wrap { display: flex; flex-direction: column; }
    .fc-section {
      padding: 14px 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 10px;
    }
    .fc-h {
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-faint); font-weight: 600;
    }
    .fc-row { display: flex; flex-direction: column; gap: 6px; }
    .fc-row.tworow { flex-direction: row; gap: 8px; }
    .fc-lbl {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; color: var(--text);
    }
    .fc-lbl .v { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
    .fc-mini {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 6px 10px;
      border-radius: 2px;
    }
    .fc-mlbl { font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; }
    .fc-mval { font-size: 14px; color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .fc-mval span { font-size: 10px; color: var(--text-dim); font-weight: 400; }
    .fc-hint { font-size: 10px; color: var(--text-faint); line-height: 1.4; font-family: var(--sans); }
    .fc-rng {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--text-faint); margin-top: 2px;
    }
    .fc-seg {
      display: flex; gap: 0;
      background: var(--panel-2); border: 1px solid var(--line); border-radius: 2px;
    }
    .fc-seg button {
      appearance: none;
      flex: 1;
      background: transparent;
      border: 0;
      border-right: 1px solid var(--line);
      color: var(--text-dim);
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
      padding: 6px 8px; cursor: default;
      text-transform: uppercase;
    }
    .fc-seg button:last-child { border-right: 0; }
    .fc-seg button:hover { color: var(--text); }
    .fc-seg button.on { background: var(--accent); color: #000; font-weight: 600; }
    .fc-slider {
      appearance: none; -webkit-appearance: none;
      width: 100%; height: 4px; margin: 4px 0;
      background: var(--line-2); border-radius: 2px; outline: none;
    }
    .fc-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: default;
      border: 2px solid var(--bg);
    }
    .fc-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: default;
      border: 2px solid var(--bg);
    }
    .fc-gauge { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .fc-gauge-track {
      position: relative;
      height: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .fc-gauge-fill { position: absolute; top: 0; bottom: 0; left: 0; transition: width .12s linear; }
    .fc-gauge-fill.ok { background: var(--truth); }
    .fc-gauge-fill.warn { background: var(--estimate); }
    .fc-gauge-thr {
      position: absolute; top: -2px; bottom: -2px;
      width: 1px;
      background: var(--text);
      box-shadow: 0 0 4px var(--text);
      z-index: 2;
    }
    .fc-gauge-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; color: var(--text-dim);
    }
    .fc-gauge-meta .mono { color: var(--text); font-variant-numeric: tabular-nums; }
    .fc-gauge-meta .chip {
      margin-left: auto;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 2px;
      font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .fc-gauge-meta .chip.ok { color: var(--truth); border-color: color-mix(in oklch, var(--truth) 50%, var(--line)); }
    .fc-gauge-meta .chip.warn { color: var(--estimate); border-color: color-mix(in oklch, var(--estimate) 50%, var(--line)); }
    .fc-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .fc-btn {
      appearance: none;
      height: 30px;
      padding: 0 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
      cursor: default; border-radius: 2px;
      flex: 1; min-width: 100px;
    }
    .fc-btn:hover { border-color: var(--line-2); }
    .fc-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .fc-btn.danger { color: var(--danger); }
    .fc-btn:disabled { opacity: 0.4; }
    .graph-canvas-wrap { flex: 1; min-height: 0; position: relative; }
    .graph-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
    .graph-meta { display: flex; gap: 16px; padding: 8px 14px; border-top: 1px solid var(--line); background: var(--panel-2); }
    .graph-meta .item { display: flex; flex-direction: column; gap: 2px; }
    .graph-meta .k { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
    .graph-meta .v { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; font-weight: 600; }
    .graph-meta .v.warn { color: var(--estimate); }
    .graph-meta .v.ok { color: var(--truth); }

    /* Bottom controls */
    .controls {
      height: 44px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      display: flex; align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .ctrl-btn {
      display: flex; align-items: center; gap: 7px;
      height: 28px;
      padding: 0 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      cursor: default;
      border-radius: 2px;
    }
    .ctrl-btn:hover { border-color: var(--line-2); background: var(--panel); }
    .ctrl-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .ctrl-btn.primary:hover { filter: brightness(1.1); }
    .ctrl-btn.danger { color: var(--danger); }
    .ctrl-btn:disabled { opacity: 0.4; }
    .ctrl-icon { width: 10px; height: 10px; display: inline-block; }
    .ctrl-divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
    .ctrl-meta { color: var(--text-dim); font-size: 10.5px; padding: 0 8px; }
    .ctrl-meta b { color: var(--text); font-weight: 500; }
    .ctrl-spacer { flex: 1; }
    .prior-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px; height: 28px;
      background: rgba(120,220,255,0.08);
      border: 1px solid rgba(120,220,255,0.4);
      color: oklch(0.85 0.1 220);
      font-size: 10.5px;
      border-radius: 2px;
    }
    .prior-banner .dot { width: 6px; height: 6px; border-radius: 50%; background: oklch(0.85 0.1 220); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
  </style>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sim.jsx"></script>
  <script type="text/babel" src="map-view.jsx"></script>
  <script type="text/babel" src="panels.jsx"></script>
  <script type="text/babel" src="controls-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "particleStyle": "dot"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const filterRef = React.useRef(null);
      if (!filterRef.current) filterRef.current = createFilter(300);
      const filter = filterRef.current;

      const [, force] = React.useReducer((x) => x + 1, 0);
      const [paused, setPaused] = React.useState(false);
      const [layers, setLayers] = React.useState({
        grid: true, particles: true, robots: true, heatmap: false, covariance: true, trail: true,
      });
      const [estPath, setEstPath] = React.useState([]);
      const [truthPath, setTruthPath] = React.useState([]);
      const [pendingPrior, setPendingPrior] = React.useState(null);
      const [iter, setIter] = React.useState(0);
      const [graphMode, setGraphMode] = React.useState('magnitude');
      const [rightTab, setRightTab] = React.useState('views');
      const [particleCount, setParticleCount] = React.useState(300);
      const [priorPreset, setPriorPreset] = React.useState('medium');

      // Rebuild filter when particle count changes
      React.useEffect(() => {
        if (filter.N === particleCount) return;
        // Preserve current params
        const oldParams = { ...filter.params };
        filterRef.current = createFilter(particleCount);
        Object.assign(filterRef.current.params, oldParams);
        setEstPath([]);
        setTruthPath([]);
        force();
      }, [particleCount]);

      // Apply theme class
      React.useEffect(() => {
        document.body.dataset.theme = t.theme;
      }, [t.theme]);

      // Sim loop — runs even when paused except step is gated
      const lastTimeRef = React.useRef(performance.now());
      React.useEffect(() => {
        let raf;
        const tick = () => {
          const now = performance.now();
          const dt = Math.min(0.06, (now - lastTimeRef.current) / 1000);
          lastTimeRef.current = now;
          if (!paused) {
            filter.step(dt);
            setIter((i) => i + 1);
            // record paths every ~5 frames
            if ((iter % 4) === 0) {
              const truth = filter.getTruth();
              const est = filter.getEst();
              setTruthPath((p) => {
                const n = [...p, { x: truth.x, y: truth.y }];
                return n.length > 240 ? n.slice(-240) : n;
              });
              setEstPath((p) => {
                const n = [...p, { x: est.x, y: est.y }];
                return n.length > 240 ? n.slice(-240) : n;
              });
            }
          }
          force();
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [paused, filter, iter]);

      const onSetPrior = (prior) => {
        setPendingPrior(prior);
      };

      const applyPrior = () => {
        if (!pendingPrior) return;
        filter.reset(pendingPrior);
        setEstPath([]);
        setTruthPath([]);
        setPendingPrior(null);
      };
      const cancelPrior = () => setPendingPrior(null);

      const restart = () => {
        filter.reset();
        setEstPath([]);
        setTruthPath([]);
        setPendingPrior(null);
      };

      const stepOnce = () => filter.step(0.04);

      const truth = filter.getTruth();
      const est = filter.getEst();
      const cov = filter.getCov();
      const hist = filter.getErrorHistory();
      const lastErr = hist.length ? hist[hist.length - 1].err : 0;
      // ESS
      let essInv = 0;
      for (let i = 0; i < filter.N; i++) essInv += filter.pw[i] * filter.pw[i];
      const ess = 1 / essInv;
      const conv = filter.getConvergence();
      const elapsed = filter.getElapsed();

      const toggleLayer = (k) => setLayers((L) => ({ ...L, [k]: !L[k] }));

      const palettes = {
        real: { skyTop: '#1a2230', skyMid: '#0f1620', floorTop: '#0c0f14', floorBot: '#1c1f25', wall: [180, 180, 195], crosshair: 'rgba(255,255,255,0.4)', scanlines: true },
        gs:   { skyTop: '#102018', skyMid: '#0a1410', floorTop: '#0a1410', floorBot: '#152622', wall: [120, 220, 180], crosshair: 'rgba(120,220,180,0.6)', scanlines: false },
      };

      // Best particle pose
      let bestI = 0, bestW = 0;
      for (let i = 0; i < filter.N; i++) if (filter.pw[i] > bestW) { bestW = filter.pw[i]; bestI = i; }
      const bestPose = { x: filter.px[bestI], y: filter.py[bestI], theta: filter.pt[bestI] };

      const fmt = (n, d = 1) => (Number.isFinite(n) ? n.toFixed(d) : '—');

      return (
        <>
          {/* Top status bar */}
          <div className="topbar">
            <div className="brand">
              <div className="brand-mark"></div>
              <div>
                <div className="title">3DGS-PF</div>
                <div className="sub">localization · console</div>
              </div>
            </div>
            <div className="stats">
              <div className="stat">
                <div className="k">Status</div>
                <div className={"v " + (paused ? "warn" : "ok")}>
                  {paused ? "PAUSED" : "RUNNING"}
                </div>
              </div>
              <div className="stat">
                <div className="k">Iter</div>
                <div className="v">{iter}</div>
              </div>
              <div className="stat">
                <div className="k">t</div>
                <div className="v">{fmt(elapsed, 1)}<span className="unit">s</span></div>
              </div>
              <div className="stat">
                <div className="k">Particles</div>
                <div className="v">{filter.N}</div>
              </div>
              <div className="stat">
                <div className="k">ESS</div>
                <div className={"v " + (ess > filter.N * 0.5 ? "ok" : "warn")}>{fmt(ess, 0)}</div>
              </div>
              <div className="stat">
                <div className="k">Err</div>
                <div className={"v " + (lastErr < 8 ? "ok" : lastErr < 25 ? "warn" : "err")}>
                  {fmt(lastErr, 1)}<span className="unit">px</span>
                </div>
              </div>
              <div className="stat">
                <div className="k">Conv</div>
                <div className={"v " + (conv > 0.7 ? "ok" : "warn")}>{(conv * 100).toFixed(0)}<span className="unit">%</span></div>
              </div>
              <div className="stat">
                <div className="k">FPS</div>
                <div className="v ok">60</div>
              </div>
            </div>
            <div className="right">
              <div className="led"></div>
              <span>tcp://10.0.4.21:9091</span>
            </div>
          </div>

          {/* Main grid */}
          <div className="root">
            {/* Left rail */}
            <div className="rail">
              <div className="rail-section">
                <h3>Map Source</h3>
                <div className="pgm-meta">
                  <div><b>occupancy_grid.pgm</b></div>
                  <div>resolution 0.05 m/px</div>
                  <div>origin (0.00, 0.00, 0.00)</div>
                  <div>{MAP_W}×{MAP_H} cells</div>
                </div>
              </div>

              <div className="rail-section">
                <h3>Layers</h3>
                {[
                  { k: 'grid', name: 'Occupancy grid', sw: '#9aa3b2' },
                  { k: 'particles', name: 'Particles', sw: 'oklch(0.78 0.14 200)' },
                  { k: 'heatmap', name: 'Density heatmap', sw: 'oklch(0.78 0.14 75)' },
                  { k: 'robots', name: 'Robot markers', sw: 'oklch(0.78 0.16 145)' },
                  { k: 'covariance', name: '2σ covariance', sw: 'oklch(0.78 0.14 75)' },
                  { k: 'trail', name: 'Path history', sw: '#7d8493' },
                ].map((l) => (
                  <div key={l.k} className="layer-toggle" onClick={() => toggleLayer(l.k)}>
                    <span className="name"><span className="swatch" style={{background: l.sw}}></span>{l.name}</span>
                    <span className="switch" data-on={layers[l.k] ? '1' : '0'}><i /></span>
                  </div>
                ))}
              </div>

              <div className="rail-section">
                <h3>Legend</h3>
                <div className="legend-row"><span className="dot gt"></span>Ground truth pose</div>
                <div className="legend-row"><span className="dot est"></span>PF estimate (mean)</div>
                <div className="legend-row"><span className="dot" style={{background: 'oklch(0.78 0.14 200)'}}></span>Particle (high w)</div>
                <div className="legend-row"><span className="dot" style={{background: 'oklch(0.5 0.08 230)'}}></span>Particle (low w)</div>
              </div>

              <div className="rail-section">
                <h3>Pose · Truth</h3>
                <div className="pgm-meta" style={{ fontFamily: 'var(--mono)' }}>
                  <div>x: <b>{fmt(truth.x * 0.05, 2)}</b> m</div>
                  <div>y: <b>{fmt(truth.y * 0.05, 2)}</b> m</div>
                  <div>θ: <b>{fmt(truth.theta * 180 / Math.PI, 1)}</b>°</div>
                </div>
              </div>
              <div className="rail-section">
                <h3>Pose · Estimate</h3>
                <div className="pgm-meta" style={{ fontFamily: 'var(--mono)' }}>
                  <div>x: <b>{fmt(est.x * 0.05, 2)}</b> m</div>
                  <div>y: <b>{fmt(est.y * 0.05, 2)}</b> m</div>
                  <div>θ: <b>{fmt(est.theta * 180 / Math.PI, 1)}</b>°</div>
                  <div>σx: <b>{fmt(Math.sqrt(cov.xx) * 0.05, 3)}</b> m</div>
                  <div>σy: <b>{fmt(Math.sqrt(cov.yy) * 0.05, 3)}</b> m</div>
                </div>
              </div>
            </div>

            {/* Center map */}
            <div className="map-col">
              <MapView
                filter={filter}
                paused={paused}
                theme={t.theme}
                particleStyle={t.particleStyle}
                layers={layers}
                onSetPrior={onSetPrior}
                estPath={estPath}
                truthPath={truthPath}
              />
            </div>

            {/* Right column */}
            <div className="right-col">
              <div className="col-tabs">
                <button className={"col-tab " + (rightTab === 'views' ? 'on' : '')}
                        onClick={() => setRightTab('views')}>
                  Views <span className="badge">cam · err</span>
                </button>
                <button className={"col-tab " + (rightTab === 'filter' ? 'on' : '')}
                        onClick={() => setRightTab('filter')}>
                  Filter <span className="badge">params</span>
                </button>
              </div>

              {rightTab === 'views' && (
                <div className="right-pane">
                  <div className="right-section">
                    <div className="head">
                      <span>Camera Views</span>
                      <span className="pill">stacked</span>
                    </div>
                    <CameraCanvas
                      pose={truth}
                      label="ROBOT.cam0"
                      sublabel="real RGB · /camera/image_raw"
                      palette={palettes.real}
                      accent="oklch(0.78 0.16 145)"
                    />
                    <CameraCanvas
                      pose={bestPose}
                      label="3DGS.render"
                      sublabel={`best particle · w=${bestW.toFixed(3)}`}
                      palette={palettes.gs}
                      accent="oklch(0.78 0.14 200)"
                    />
                  </div>

                  <div className="right-section graph-card">
                    <div className="head">
                      <span>Localization Error</span>
                      <div className="graph-tabs">
                        <button
                          className={"gtab " + (graphMode === 'magnitude' ? 'on' : '')}
                          onClick={() => setGraphMode('magnitude')}
                        >‖Δp‖</button>
                        <button
                          className={"gtab " + (graphMode === 'components' ? 'on' : '')}
                          onClick={() => setGraphMode('components')}
                        >Δx Δy Δθ</button>
                      </div>
                      <span className="pill">last 30s</span>
                    </div>
                    <ErrorGraph history={hist} theme={t.theme} mode={graphMode} />
                    <div className="graph-meta">
                      <div className="item"><span className="k">Now</span><span className="v warn">{fmt(lastErr, 2)} px</span></div>
                      <div className="item"><span className="k">Mean</span><span className="v">{fmt(hist.length ? hist.slice(-150).reduce((a,p) => a+p.err, 0) / Math.min(150, hist.length) : 0, 2)} px</span></div>
                      <div className="item"><span className="k">Min</span><span className="v ok">{fmt(hist.length ? Math.min(...hist.slice(-150).map(p => p.err)) : 0, 2)} px</span></div>
                      <div className="item"><span className="k">Max</span><span className="v">{fmt(hist.length ? Math.max(...hist.slice(-150).map(p => p.err)) : 0, 2)} px</span></div>
                    </div>
                  </div>
                </div>
              )}

              {rightTab === 'filter' && (
                <div className="right-pane scroll">
                  <FilterControls
                    filter={filter}
                    particleCount={particleCount}
                    setParticleCount={setParticleCount}
                    paused={paused}
                    setPaused={setPaused}
                    onReset={restart}
                    onStep={stepOnce}
                    priorPreset={priorPreset}
                    setPriorPreset={setPriorPreset}
                  />
                </div>
              )}
            </div>
          </div>

          {/* Bottom controls */}
          <div className="controls">
            <button className={"ctrl-btn " + (paused ? "primary" : "")} onClick={() => setPaused((p) => !p)}>
              {paused ? "▶ RESUME" : "❚❚ PAUSE"}
            </button>
            <button className="ctrl-btn" onClick={stepOnce} disabled={!paused}>
              ⤳ STEP
            </button>
            <button className="ctrl-btn danger" onClick={restart}>
              ↻ RESET (global seed)
            </button>
            <div className="ctrl-divider"></div>
            <span className="ctrl-meta">node <b>/pf_node</b> · topic <b>/particles</b> · rate <b>20Hz</b></span>
            <div className="ctrl-spacer"></div>
            {pendingPrior && (
              <div className="prior-banner">
                <span className="dot"></span>
                NEW PRIOR @ ({fmt(pendingPrior.x, 1)}, {fmt(pendingPrior.y, 1)}) θ={fmt(pendingPrior.theta * 180 / Math.PI, 0)}°
                <button className="ctrl-btn primary" style={{ height: 22, padding: '0 10px', marginLeft: 4 }} onClick={applyPrior}>APPLY &amp; RESTART</button>
                <button className="ctrl-btn" style={{ height: 22, padding: '0 10px' }} onClick={cancelPrior}>CANCEL</button>
              </div>
            )}
            {!pendingPrior && (
              <span className="ctrl-meta" style={{opacity: 0.7}}>tip: <b>left-drag</b> on map to set new prior</span>
            )}
          </div>

          <TweaksPanel title="Console Tweaks">
            <TweakSection label="Theme" />
            <TweakRadio label="Mode" value={t.theme} options={['dark', 'light']}
                        onChange={(v) => setTweak('theme', v)} />
            <TweakSection label="Particles" />
            <TweakRadio label="Style" value={t.particleStyle}
                        options={[
                          { value: 'dot', label: 'dot+line' },
                          { value: 'arrow', label: 'arrow' },
                          { value: 'triangle', label: 'tri' },
                        ]}
                        onChange={(v) => setTweak('particleStyle', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
